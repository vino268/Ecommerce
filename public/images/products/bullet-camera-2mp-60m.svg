<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Mount bracket -->
  <rect x="70" y="125" width="35" height="90" rx="4" fill="#adb5bd" stroke="#868e96" stroke-width="2"/>
  <rect x="55" y="115" width="65" height="20" rx="4" fill="#868e96"/>
  <!-- Bullet body - longer for 60m -->
  <rect x="95" y="140" width="220" height="55" rx="27" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Lens hood - larger -->
  <rect x="290" y="133" width="50" height="70" rx="6" fill="#495057" stroke="#343a40" stroke-width="2"/>
  <!-- Lens -->
  <circle cx="325" cy="168" r="24" fill="url(#lens)"/>
  <circle cx="325" cy="168" r="16" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="325" cy="168" r="9" fill="#212529"/>
  <circle cx="319" cy="162" r="4" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs ring -->
  <circle cx="300" cy="150" r="3" fill="#dc3545" opacity="0.7"/>
  <circle cx="300" cy="186" r="3" fill="#dc3545" opacity="0.7"/>
  <circle cx="295" cy="160" r="2.5" fill="#dc3545" opacity="0.5"/>
  <circle cx="295" cy="176" r="2.5" fill="#dc3545" opacity="0.5"/>
  <!-- Ventilation lines -->
  <line x1="130" y1="150" x2="130" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <line x1="148" y1="150" x2="148" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <line x1="166" y1="150" x2="166" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <line x1="184" y1="150" x2="184" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <!-- Cable -->
  <path d="M80 215 Q80 250 105 260" stroke="#868e96" stroke-width="3" fill="none"/>
  <!-- Label -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">2MP IR Bullet Camera</text>
  <text x="200" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">60Mtr IR Range | Varifocal</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#0d6efd"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2 MP</text>
</svg>