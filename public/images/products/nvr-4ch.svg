<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#343a40"/>
      <stop offset="100%" style="stop-color:#212529"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- NVR body -->
  <rect x="60" y="120" width="280" height="60" rx="5" fill="url(#body)" stroke="#495057" stroke-width="2"/>
  <!-- Front panel -->
  <rect x="70" y="128" width="260" height="44" rx="3" fill="#2b3035"/>
  <!-- Status LEDs -->
  <circle cx="90" cy="140" r="3" fill="#28a745"/>
  <circle cx="105" cy="140" r="3" fill="#0d6efd"/>
  <circle cx="120" cy="140" r="3" fill="#ffc107"/>
  <circle cx="135" cy="140" r="3" fill="#ffc107"/>
  <!-- HDD indicator -->
  <rect x="155" y="135" width="20" height="10" rx="2" fill="#495057"/>
  <text x="165" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#adb5bd">HDD</text>
  <!-- USB ports -->
  <rect x="280" y="135" width="15" height="10" rx="2" fill="#495057"/>
  <rect x="300" y="135" width="15" height="10" rx="2" fill="#495057"/>
  <!-- Power button -->
  <circle cx="90" cy="160" r="5" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <!-- Brand label -->
  <text x="200" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#adb5bd">CP PLUS</text>
  <!-- Channel label -->
  <rect x="235" y="153" width="40" height="14" rx="3" fill="#0d6efd" opacity="0.8"/>
  <text x="255" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">4CH</text>
  <!-- Back panel (angled view) -->
  <rect x="60" y="185" width="280" height="20" rx="3" fill="#1a1e21" stroke="#343a40" stroke-width="1"/>
  <!-- Back ports -->
  <rect x="80" y="188" width="14" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="100" y="188" width="14" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="120" y="188" width="14" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="140" y="188" width="14" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="170" y="188" width="30" height="14" rx="2" fill="#343a40" stroke="#0d6efd" stroke-width="1"/>
  <rect x="210" y="188" width="20" height="14" rx="2" fill="#343a40" stroke="#ffc107" stroke-width="1"/>
  <rect x="240" y="188" width="20" height="14" rx="2" fill="#343a40" stroke="#dc3545" stroke-width="1"/>
  <!-- Rubber feet -->
  <rect x="80" y="208" width="20" height="5" rx="2" fill="#495057"/>
  <rect x="300" y="208" width="20" height="5" rx="2" fill="#495057"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">4CH 4K Network Video Recorder</text>
  <text x="200" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">1 SATA | HDMI + VGA</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#dc3545"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4K</text>
</svg>