<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Mount bracket -->
  <rect x="68" y="122" width="38" height="95" rx="4" fill="#adb5bd" stroke="#868e96" stroke-width="2"/>
  <rect x="50" y="112" width="72" height="20" rx="4" fill="#868e96"/>
  <!-- Bullet body - longer for 60m -->
  <rect x="96" y="136" width="230" height="58" rx="29" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Lens hood - larger -->
  <rect x="300" y="128" width="55" height="74" rx="7" fill="#495057" stroke="#343a40" stroke-width="2"/>
  <!-- Lens -->
  <circle cx="338" cy="165" r="26" fill="url(#lens)"/>
  <circle cx="338" cy="165" r="18" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="338" cy="165" r="11" fill="#212529"/>
  <circle cx="331" cy="158" r="4.5" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs ring -->
  <circle cx="310" cy="146" r="4" fill="#dc3545" opacity="0.7"/>
  <circle cx="310" cy="184" r="4" fill="#dc3545" opacity="0.7"/>
  <circle cx="306" cy="156" r="3" fill="#dc3545" opacity="0.6"/>
  <circle cx="306" cy="174" r="3" fill="#dc3545" opacity="0.6"/>
  <!-- Ventilation lines -->
  <line x1="135" y1="148" x2="135" y2="182" stroke="#adb5bd" stroke-width="1"/>
  <line x1="155" y1="148" x2="155" y2="182" stroke="#adb5bd" stroke-width="1"/>
  <line x1="175" y1="148" x2="175" y2="182" stroke="#adb5bd" stroke-width="1"/>
  <line x1="195" y1="148" x2="195" y2="182" stroke="#adb5bd" stroke-width="1"/>
  <line x1="215" y1="148" x2="215" y2="182" stroke="#adb5bd" stroke-width="1"/>
  <!-- Cable -->
  <path d="M76 217 Q76 255 102 265" stroke="#868e96" stroke-width="3" fill="none"/>
  <!-- Label -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">4MP IR Bullet Camera</text>
  <text x="200" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">60Mtr IR Range | Varifocal</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#198754"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4 MP</text>
</svg>