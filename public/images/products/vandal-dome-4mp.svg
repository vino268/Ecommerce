<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e9ecef"/>
      <stop offset="100%" style="stop-color:#ced4da"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Vandal dome - heavy duty -->
  <ellipse cx="200" cy="228" rx="135" ry="48" fill="#868e96" stroke="#6c757d" stroke-width="3"/>
  <path d="M65 228 Q65 105 200 85 Q335 105 335 228" fill="url(#body)" stroke="#6c757d" stroke-width="3"/>
  <!-- Reinforcement ring -->
  <ellipse cx="200" cy="228" rx="130" ry="45" fill="none" stroke="#495057" stroke-width="2.5" stroke-dasharray="10,5"/>
  <!-- Dome glass -->
  <ellipse cx="200" cy="180" rx="80" ry="70" fill="#212529" opacity="0.85"/>
  <ellipse cx="200" cy="180" rx="75" ry="65" fill="#343a40" opacity="0.65"/>
  <!-- Lens - large for 4MP -->
  <circle cx="200" cy="192" r="30" fill="url(#lens)"/>
  <circle cx="200" cy="192" r="20" fill="#495057" stroke="#6c757d" stroke-width="1.5"/>
  <circle cx="200" cy="192" r="12" fill="#212529"/>
  <circle cx="192" cy="184" r="5" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs -->
  <circle cx="160" cy="172" r="5" fill="#dc3545" opacity="0.7"/>
  <circle cx="240" cy="172" r="5" fill="#dc3545" opacity="0.7"/>
  <circle cx="175" cy="153" r="4" fill="#dc3545" opacity="0.6"/>
  <circle cx="225" cy="153" r="4" fill="#dc3545" opacity="0.6"/>
  <circle cx="200" cy="145" r="3.5" fill="#dc3545" opacity="0.5"/>
  <!-- IK10 shield -->
  <path d="M325 75 L345 85 L345 108 L335 118 L325 118 L315 108 L315 85 Z" fill="#ffc107" stroke="#e5a100" stroke-width="1.5"/>
  <text x="330" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">IK10</text>
  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">4MP Vandal Dome Camera</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">50Mtr | Motorized | IVS</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#198754"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4 MP</text>
</svg>