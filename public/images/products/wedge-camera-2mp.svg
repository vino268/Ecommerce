<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Mount -->
  <rect x="175" y="100" width="50" height="20" rx="4" fill="#868e96"/>
  <!-- Wedge body -->
  <path d="M130 120 L270 120 L290 220 L110 220 Z" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Front face -->
  <rect x="120" y="220" width="160" height="40" rx="4" fill="#e9ecef" stroke="#868e96" stroke-width="2"/>
  <!-- Lens -->
  <circle cx="200" cy="240" r="15" fill="url(#lens)"/>
  <circle cx="200" cy="240" r="10" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="200" cy="240" r="5" fill="#212529"/>
  <circle cx="196" cy="236" r="2.5" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs -->
  <circle cx="155" cy="235" r="3" fill="#dc3545" opacity="0.7"/>
  <circle cx="245" cy="235" r="3" fill="#dc3545" opacity="0.7"/>
  <circle cx="155" cy="248" r="2.5" fill="#dc3545" opacity="0.5"/>
  <circle cx="245" cy="248" r="2.5" fill="#dc3545" opacity="0.5"/>
  <!-- SD card slot indicator -->
  <rect x="250" y="175" width="20" height="8" rx="2" fill="#adb5bd" stroke="#868e96" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">2MP IR Wedge Camera</text>
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">30Mtr | Micro SD Support</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#0d6efd"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2 MP</text>
</svg>