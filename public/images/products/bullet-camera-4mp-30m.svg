<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Mount bracket -->
  <rect x="80" y="128" width="32" height="85" rx="4" fill="#adb5bd" stroke="#868e96" stroke-width="2"/>
  <rect x="63" y="118" width="65" height="20" rx="4" fill="#868e96"/>
  <!-- Bullet body -->
  <rect x="102" y="142" width="205" height="54" rx="27" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Lens hood -->
  <rect x="285" y="136" width="42" height="65" rx="5" fill="#495057" stroke="#343a40" stroke-width="2"/>
  <!-- Lens -->
  <circle cx="316" cy="169" r="22" fill="url(#lens)"/>
  <circle cx="316" cy="169" r="15" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="316" cy="169" r="9" fill="#212529"/>
  <circle cx="310" cy="163" r="3.5" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs -->
  <circle cx="294" cy="152" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="294" cy="186" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="290" cy="162" r="2.5" fill="#dc3545" opacity="0.5"/>
  <circle cx="290" cy="176" r="2.5" fill="#dc3545" opacity="0.5"/>
  <!-- Ventilation lines -->
  <line x1="140" y1="153" x2="140" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <line x1="158" y1="153" x2="158" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <line x1="176" y1="153" x2="176" y2="185" stroke="#adb5bd" stroke-width="1"/>
  <!-- Cable -->
  <path d="M88 213 Q88 248 112 258" stroke="#868e96" stroke-width="3" fill="none"/>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">4MP IR Bullet Camera</text>
  <text x="200" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">30Mtr IR Range | Ultra HD</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#198754"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4 MP</text>
</svg>