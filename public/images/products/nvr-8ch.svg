<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#343a40"/>
      <stop offset="100%" style="stop-color:#212529"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- NVR body - slightly larger -->
  <rect x="50" y="115" width="300" height="70" rx="5" fill="url(#body)" stroke="#495057" stroke-width="2"/>
  <!-- Front panel -->
  <rect x="60" y="123" width="280" height="54" rx="3" fill="#2b3035"/>
  <!-- Status LEDs -->
  <circle cx="80" cy="138" r="3.5" fill="#28a745"/>
  <circle cx="98" cy="138" r="3.5" fill="#0d6efd"/>
  <circle cx="116" cy="138" r="3.5" fill="#ffc107"/>
  <circle cx="134" cy="138" r="3.5" fill="#ffc107"/>
  <circle cx="152" cy="138" r="3" fill="#ffc107"/>
  <circle cx="168" cy="138" r="3" fill="#ffc107"/>
  <circle cx="184" cy="138" r="3" fill="#ffc107"/>
  <circle cx="200" cy="138" r="3" fill="#ffc107"/>
  <!-- HDD indicators -->
  <rect x="225" y="133" width="20" height="10" rx="2" fill="#495057"/>
  <rect x="250" y="133" width="20" height="10" rx="2" fill="#495057"/>
  <text x="235" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#adb5bd">HDD1</text>
  <text x="260" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#adb5bd">HDD2</text>
  <!-- USB ports -->
  <rect x="290" y="133" width="15" height="10" rx="2" fill="#495057"/>
  <rect x="310" y="133" width="15" height="10" rx="2" fill="#495057"/>
  <!-- Brand label -->
  <text x="200" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#adb5bd">CP PLUS</text>
  <!-- Channel label -->
  <rect x="245" y="157" width="45" height="15" rx="3" fill="#0d6efd" opacity="0.8"/>
  <text x="268" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">8CH</text>
  <!-- Power button -->
  <circle cx="80" cy="165" r="5.5" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <!-- Back panel -->
  <rect x="50" y="190" width="300" height="22" rx="3" fill="#1a1e21" stroke="#343a40" stroke-width="1"/>
  <!-- Back ports - 8 channels -->
  <rect x="70" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="87" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="104" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="121" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="138" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="155" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="172" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="189" y="194" width="12" height="14" rx="2" fill="#343a40" stroke="#495057" stroke-width="1"/>
  <rect x="215" y="194" width="30" height="14" rx="2" fill="#343a40" stroke="#0d6efd" stroke-width="1"/>
  <rect x="255" y="194" width="20" height="14" rx="2" fill="#343a40" stroke="#ffc107" stroke-width="1"/>
  <rect x="285" y="194" width="20" height="14" rx="2" fill="#343a40" stroke="#dc3545" stroke-width="1"/>
  <!-- Rubber feet -->
  <rect x="70" y="216" width="22" height="5" rx="2" fill="#495057"/>
  <rect x="308" y="216" width="22" height="5" rx="2" fill="#495057"/>
  <!-- Label -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">8CH 4K Network Video Recorder</text>
  <text x="200" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">2 SATA | HDMI + VGA | ANR</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#dc3545"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4K</text>
</svg>