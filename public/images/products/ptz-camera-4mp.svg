<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Mount arm -->
  <rect x="170" y="60" width="60" height="22" rx="5" fill="#868e96"/>
  <rect x="186" y="76" width="28" height="35" fill="#adb5bd" stroke="#868e96" stroke-width="1.5"/>
  <!-- PTZ dome base - larger -->
  <ellipse cx="200" cy="190" rx="100" ry="35" fill="#868e96" stroke="#6c757d" stroke-width="2.5"/>
  <!-- PTZ body -->
  <rect x="125" y="110" width="150" height="80" rx="75" fill="url(#body)" stroke="#868e96" stroke-width="2.5"/>
  <!-- Dome cover -->
  <path d="M120 190 Q120 125 200 108 Q280 125 280 190" fill="url(#body)" stroke="#868e96" stroke-width="2.5"/>
  <!-- Tinted dome glass -->
  <ellipse cx="200" cy="172" rx="68" ry="55" fill="#212529" opacity="0.75"/>
  <ellipse cx="200" cy="172" rx="63" ry="50" fill="#343a40" opacity="0.55"/>
  <!-- Lens inside dome - larger for 4MP -->
  <circle cx="200" cy="178" r="26" fill="url(#lens)"/>
  <circle cx="200" cy="178" r="18" fill="#495057" stroke="#6c757d" stroke-width="1.5"/>
  <circle cx="200" cy="178" r="10" fill="#212529"/>
  <circle cx="193" cy="171" r="4" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs - more for 150m range -->
  <circle cx="166" cy="162" r="4" fill="#dc3545" opacity="0.8"/>
  <circle cx="234" cy="162" r="4" fill="#dc3545" opacity="0.8"/>
  <circle cx="174" cy="146" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="226" cy="146" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="188" cy="136" r="3" fill="#dc3545" opacity="0.6"/>
  <circle cx="212" cy="136" r="3" fill="#dc3545" opacity="0.6"/>
  <!-- Pan/Tilt arrows -->
  <path d="M80 195 L62 190 L80 185" stroke="#198754" stroke-width="2.5" fill="none"/>
  <path d="M320 195 L338 190 L320 185" stroke="#198754" stroke-width="2.5" fill="none"/>
  <path d="M195 88 L200 70 L205 88" stroke="#198754" stroke-width="2.5" fill="none"/>
  <!-- 360 label -->
  <text x="42" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#198754">360°</text>
  <!-- AI badge -->
  <rect x="15" y="20" width="55" height="28" rx="14" fill="#6f42c1"/>
  <text x="42" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">AI</text>
  <!-- Label -->
  <text x="200" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">4MP 25X PTZ Camera</text>
  <text x="200" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">150Mtr IR | AI Analytics</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#198754"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4 MP</text>
</svg>