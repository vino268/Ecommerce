<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#343a40"/>
      <stop offset="100%" style="stop-color:#212529"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- NVR body - largest -->
  <rect x="40" y="110" width="320" height="80" rx="5" fill="url(#body)" stroke="#495057" stroke-width="2"/>
  <!-- Front panel -->
  <rect x="50" y="118" width="300" height="64" rx="3" fill="#2b3035"/>
  <!-- Status LEDs - 16 channels -->
  <circle cx="70" cy="133" r="3" fill="#28a745"/>
  <circle cx="86" cy="133" r="3" fill="#0d6efd"/>
  <circle cx="102" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="115" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="128" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="141" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="154" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="167" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="180" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="193" cy="133" r="2.5" fill="#ffc107"/>
  <circle cx="206" cy="133" r="2" fill="#ffc107"/>
  <circle cx="218" cy="133" r="2" fill="#ffc107"/>
  <circle cx="230" cy="133" r="2" fill="#ffc107"/>
  <circle cx="242" cy="133" r="2" fill="#ffc107"/>
  <circle cx="254" cy="133" r="2" fill="#ffc107"/>
  <circle cx="266" cy="133" r="2" fill="#ffc107"/>
  <circle cx="278" cy="133" r="2" fill="#ffc107"/>
  <circle cx="290" cy="133" r="2" fill="#ffc107"/>
  <!-- HDD indicators -->
  <rect x="300" y="128" width="20" height="10" rx="2" fill="#495057"/>
  <rect x="325" y="128" width="20" height="10" rx="2" fill="#495057"/>
  <!-- Power button -->
  <circle cx="70" cy="168" r="6" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <!-- Brand label -->
  <text x="200" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#adb5bd">CP PLUS</text>
  <!-- Channel label -->
  <rect x="262" y="158" width="50" height="16" rx="3" fill="#0d6efd" opacity="0.8"/>
  <text x="287" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">16CH</text>
  <!-- USB ports -->
  <rect x="310" y="158" width="15" height="10" rx="2" fill="#495057"/>
  <rect x="330" y="158" width="15" height="10" rx="2" fill="#495057"/>
  <!-- Back panel -->
  <rect x="40" y="195" width="320" height="25" rx="3" fill="#1a1e21" stroke="#343a40" stroke-width="1"/>
  <!-- Rubber feet -->
  <rect x="60" y="224" width="25" height="6" rx="2" fill="#495057"/>
  <rect x="315" y="224" width="25" height="6" rx="2" fill="#495057"/>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">16CH 4K Network Video Recorder</text>
  <text x="200" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">2 SATA (20TB) | IVS Analytics</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#dc3545"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4K</text>
</svg>