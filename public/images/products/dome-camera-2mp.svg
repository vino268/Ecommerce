<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Dome body -->
  <ellipse cx="200" cy="220" rx="120" ry="40" fill="#adb5bd" stroke="#868e96" stroke-width="2"/>
  <path d="M80 220 Q80 120 200 100 Q320 120 320 220" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Dome glass -->
  <ellipse cx="200" cy="180" rx="70" ry="60" fill="#212529" opacity="0.8"/>
  <ellipse cx="200" cy="180" rx="65" ry="55" fill="#343a40" opacity="0.6"/>
  <!-- Lens -->
  <circle cx="200" cy="190" r="25" fill="url(#lens)"/>
  <circle cx="200" cy="190" r="15" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="200" cy="190" r="8" fill="#212529"/>
  <circle cx="193" cy="183" r="4" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs -->
  <circle cx="170" cy="170" r="4" fill="#dc3545" opacity="0.7"/>
  <circle cx="230" cy="170" r="4" fill="#dc3545" opacity="0.7"/>
  <circle cx="185" cy="155" r="3" fill="#dc3545" opacity="0.5"/>
  <circle cx="215" cy="155" r="3" fill="#dc3545" opacity="0.5"/>
  <!-- Mount plate -->
  <rect x="170" y="255" width="60" height="15" rx="3" fill="#adb5bd" stroke="#868e96" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">2MP IR Dome Camera</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">30Mtr IR Range</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#0d6efd"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2 MP</text>
</svg>