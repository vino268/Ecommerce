<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Turret mount arm -->
  <rect x="180" y="100" width="40" height="25" rx="4" fill="#868e96"/>
  <rect x="185" y="115" width="10" height="50" fill="#adb5bd" stroke="#868e96" stroke-width="1"/>
  <rect x="205" y="115" width="10" height="50" fill="#adb5bd" stroke="#868e96" stroke-width="1"/>
  <!-- Turret ball body -->
  <circle cx="200" cy="195" r="60" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Front face -->
  <circle cx="200" cy="195" r="50" fill="#212529" opacity="0.8"/>
  <circle cx="200" cy="195" r="45" fill="#343a40" opacity="0.6"/>
  <!-- Lens -->
  <circle cx="200" cy="195" r="25" fill="url(#lens)"/>
  <circle cx="200" cy="195" r="17" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="200" cy="195" r="10" fill="#212529"/>
  <circle cx="194" cy="189" r="4" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs around lens -->
  <circle cx="170" cy="180" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="230" cy="180" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="170" cy="210" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="230" cy="210" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="185" cy="165" r="3" fill="#dc3545" opacity="0.5"/>
  <circle cx="215" cy="165" r="3" fill="#dc3545" opacity="0.5"/>
  <!-- AI indicator -->
  <rect x="15" y="20" width="55" height="28" rx="14" fill="#6f42c1"/>
  <text x="42" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">AI</text>
  <!-- Label -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">4MP AI Turret Camera</text>
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">Face Detection | Analytics</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#198754"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4 MP</text>
</svg>