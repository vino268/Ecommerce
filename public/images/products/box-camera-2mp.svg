<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9ecef"/>
      <stop offset="100%" style="stop-color:#ced4da"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Box camera body -->
  <rect x="90" y="130" width="220" height="120" rx="6" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Front panel -->
  <rect x="85" y="135" width="15" height="110" rx="3" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <!-- Lens mount -->
  <circle cx="100" cy="190" r="35" fill="#343a40" stroke="#212529" stroke-width="2"/>
  <circle cx="100" cy="190" r="28" fill="url(#lens)"/>
  <circle cx="100" cy="190" r="18" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="100" cy="190" r="10" fill="#212529"/>
  <circle cx="94" cy="184" r="4" fill="#ffffff" opacity="0.4"/>
  <!-- Back panel details -->
  <rect x="280" y="145" width="25" height="100" rx="3" fill="#adb5bd" stroke="#868e96" stroke-width="1"/>
  <!-- Ports -->
  <rect x="285" y="155" width="15" height="8" rx="2" fill="#495057"/>
  <rect x="285" y="170" width="15" height="8" rx="2" fill="#495057"/>
  <rect x="285" y="185" width="15" height="8" rx="2" fill="#6c757d"/>
  <rect x="285" y="200" width="15" height="8" rx="2" fill="#6c757d"/>
  <!-- Status LED -->
  <circle cx="285" cy="225" r="3" fill="#28a745" opacity="0.8"/>
  <!-- Top label -->
  <rect x="150" y="140" width="80" height="12" rx="2" fill="#adb5bd"/>
  <text x="190" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">CP PLUS</text>
  <!-- Label -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">2MP Full HD Box Camera</text>
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">C/CS Mount | Professional</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#0d6efd"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2 MP</text>
</svg>