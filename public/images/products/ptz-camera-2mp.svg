<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="60%" style="stop-color:#212529"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Mount arm -->
  <rect x="175" y="70" width="50" height="20" rx="4" fill="#868e96"/>
  <rect x="190" y="85" width="20" height="30" fill="#adb5bd" stroke="#868e96" stroke-width="1"/>
  <!-- PTZ dome base -->
  <ellipse cx="200" cy="190" rx="90" ry="30" fill="#868e96" stroke="#6c757d" stroke-width="2"/>
  <!-- PTZ body -->
  <rect x="135" y="115" width="130" height="75" rx="65" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Dome cover -->
  <path d="M130 190 Q130 130 200 115 Q270 130 270 190" fill="url(#body)" stroke="#868e96" stroke-width="2"/>
  <!-- Tinted dome glass -->
  <ellipse cx="200" cy="175" rx="60" ry="50" fill="#212529" opacity="0.75"/>
  <ellipse cx="200" cy="175" rx="55" ry="45" fill="#343a40" opacity="0.55"/>
  <!-- Lens inside dome -->
  <circle cx="200" cy="180" r="22" fill="url(#lens)"/>
  <circle cx="200" cy="180" r="14" fill="#495057" stroke="#6c757d" stroke-width="1"/>
  <circle cx="200" cy="180" r="8" fill="#212529"/>
  <circle cx="194" cy="174" r="3" fill="#ffffff" opacity="0.4"/>
  <!-- IR LEDs -->
  <circle cx="172" cy="165" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="228" cy="165" r="3.5" fill="#dc3545" opacity="0.7"/>
  <circle cx="180" cy="150" r="3" fill="#dc3545" opacity="0.6"/>
  <circle cx="220" cy="150" r="3" fill="#dc3545" opacity="0.6"/>
  <!-- Pan/Tilt arrows -->
  <path d="M90 195 L75 190 L90 185" stroke="#0d6efd" stroke-width="2" fill="none"/>
  <path d="M310 195 L325 190 L310 185" stroke="#0d6efd" stroke-width="2" fill="none"/>
  <path d="M195 95 L200 80 L205 95" stroke="#0d6efd" stroke-width="2" fill="none"/>
  <!-- 360 label -->
  <text x="55" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0d6efd">360°</text>
  <!-- Label -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">CP PLUS</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">2MP 20X PTZ Camera</text>
  <text x="200" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">100Mtr IR | Auto Tracking</text>
  <!-- Badge -->
  <rect x="290" y="20" width="90" height="28" rx="14" fill="#6f42c1"/>
  <text x="335" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">PTZ</text>
</svg>