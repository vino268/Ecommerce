<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Door frame -->
  <rect x="130" y="60" width="140" height="210" rx="4" fill="#efebe9" stroke="#8d6e63" stroke-width="3"/>
  <!-- Door -->
  <rect x="140" y="70" width="120" height="190" rx="3" fill="#d7ccc8" stroke="#a1887f" stroke-width="1.5"/>
  <!-- Door handle -->
  <circle cx="245" cy="165" r="6" fill="#795548" stroke="#5d4037" stroke-width="1"/>
  <!-- Biometric device -->
  <rect x="275" y="130" width="55" height="80" rx="6" fill="#263238" stroke="#37474f" stroke-width="2"/>
  <rect x="282" y="140" width="41" height="30" rx="3" fill="#00bfa5"/>
  <!-- Fingerprint icon -->
  <path d="M302 150 Q295 145 295 155 Q295 165 302 160" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  <path d="M302 148 Q292 143 292 155 Q292 167 302 162" stroke="#ffffff" stroke-width="1" fill="none"/>
  <!-- EM Lock -->
  <rect x="135" y="60" width="130" height="12" rx="3" fill="#455a64" stroke="#37474f" stroke-width="1.5"/>
  <circle cx="155" cy="66" r="3" fill="#f44336"/>
  <circle cx="170" cy="66" r="3" fill="#4caf50"/>
  <!-- Card reader -->
  <rect x="70" y="140" width="45" height="65" rx="5" fill="#37474f" stroke="#455a64" stroke-width="1.5"/>
  <rect x="77" y="150" width="31" height="20" rx="2" fill="#26a69a"/>
  <!-- Card icon -->
  <rect x="80" y="178" width="25" height="16" rx="2" fill="#80cbc4" stroke="#4db6ac" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00695c">Access Control</text>
  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00897b">Biometric & Card Reader Setup</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#26a69a">₹2,000 per door</text>
</svg>