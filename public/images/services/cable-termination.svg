<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Cable bundle -->
  <path d="M80 100 Q200 80 320 100" stroke="#1565c0" stroke-width="6" fill="none"/>
  <path d="M80 110 Q200 90 320 110" stroke="#0d47a1" stroke-width="6" fill="none"/>
  <path d="M80 120 Q200 100 320 120" stroke="#1976d2" stroke-width="6" fill="none"/>
  <!-- RJ45 connector -->
  <rect x="60" y="160" width="80" height="50" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="70" y="170" width="60" height="30" rx="3" fill="#e0e0e0"/>
  <!-- Connector pins -->
  <line x1="78" y1="175" x2="78" y2="195" stroke="#ff8f00" stroke-width="2"/>
  <line x1="86" y1="175" x2="86" y2="195" stroke="#ff8f00" stroke-width="2"/>
  <line x1="94" y1="175" x2="94" y2="195" stroke="#ff8f00" stroke-width="2"/>
  <line x1="102" y1="175" x2="102" y2="195" stroke="#ff8f00" stroke-width="2"/>
  <line x1="110" y1="175" x2="110" y2="195" stroke="#ff8f00" stroke-width="2"/>
  <line x1="118" y1="175" x2="118" y2="195" stroke="#ff8f00" stroke-width="2"/>
  <text x="100" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e65100">RJ45</text>
  <!-- BNC connector -->
  <circle cx="300" cy="185" r="25" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="2"/>
  <circle cx="300" cy="185" r="15" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <circle cx="300" cy="185" r="5" fill="#ff8f00"/>
  <text x="300" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e65100">BNC</text>
  <!-- Crimping tool -->
  <path d="M150 260 L200 240 L250 260" stroke="#424242" stroke-width="4" fill="none"/>
  <rect x="190" y="240" width="20" height="30" rx="3" fill="#616161"/>
  <!-- Label -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e65100">Cable Termination</text>
  <text x="200" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f57c00">Professional Crimping & Testing</text>
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff9800">₹250 per point</text>
</svg>