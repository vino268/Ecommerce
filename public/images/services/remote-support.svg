<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede7f6"/>
      <stop offset="100%" style="stop-color:#d1c4e9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Laptop -->
  <rect x="100" y="100" width="200" height="130" rx="6" fill="#37474f" stroke="#263238" stroke-width="2"/>
  <rect x="110" y="110" width="180" height="105" rx="3" fill="#1a237e"/>
  <!-- Screen content - remote desktop -->
  <rect x="120" y="120" width="80" height="40" fill="#283593"/>
  <rect x="210" y="120" width="70" height="40" fill="#1565c0"/>
  <rect x="120" y="168" width="160" height="35" rx="2" fill="#263238"/>
  <!-- Command line on screen -->
  <text x="130" y="182" font-family="Courier, monospace" font-size="8" fill="#4caf50">&gt; config --remote</text>
  <text x="130" y="194" font-family="Courier, monospace" font-size="8" fill="#ffffff">System OK ✓</text>
  <!-- Laptop base -->
  <path d="M80 230 L100 230 L110 240 L290 240 L300 230 L320 230 L315 245 L85 245 Z" fill="#455a64" stroke="#37474f" stroke-width="1"/>
  <!-- WiFi signal -->
  <path d="M200 70 Q180 50 160 70" stroke="#7c4dff" stroke-width="2.5" fill="none"/>
  <path d="M200 70 Q175 40 150 70" stroke="#7c4dff" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M200 70 Q170 30 140 70" stroke="#7c4dff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Headset icon -->
  <path d="M280 90 Q280 60 310 60 Q340 60 340 90" stroke="#7c4dff" stroke-width="3" fill="none"/>
  <rect x="275" y="85" width="12" height="20" rx="4" fill="#7c4dff"/>
  <rect x="333" y="85" width="12" height="20" rx="4" fill="#7c4dff"/>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4527a0">Remote Support</text>
  <text x="200" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5e35b1">Configuration & Troubleshooting</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c4dff">₹200 per session</text>
</svg>