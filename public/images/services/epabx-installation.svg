  <circle cx="125" cy="215" r="3" fill="#4caf50"/>
  <circle cx="140" cy="215" r="3" fill="#4caf50"/>
  <circle cx="155" cy="215" r="3" fill="#ff9800"/>
  <!-- Phone icons -->
  <rect x="60" y="260" width="30" height="45" rx="4" fill="#7b1fa2" stroke="#6a1b9a" stroke-width="1.5"/>
  <rect x="64" y="265" width="22" height="30" rx="2" fill="#9c27b0"/>
  <rect x="160" y="260" width="30" height="45" rx="4" fill="#7b1fa2" stroke="#6a1b9a" stroke-width="1.5"/>
  <rect x="164" y="265" width="22" height="30" rx="2" fill="#9c27b0"/>
  <rect x="260" y="260" width="30" height="45" rx="4" fill="#7b1fa2" stroke="#6a1b9a" stroke-width="1.5"/>
  <rect x="264" y="265" width="22" height="30" rx="2" fill="#9c27b0"/>
