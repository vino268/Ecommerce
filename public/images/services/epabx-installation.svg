  <rect x="100" y="80" width="200" height="160" rx="6" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="2"/>
  <text x="200" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a148c">EPABX</text>
