  <rect x="220" y="115" width="60" height="15" rx="3" fill="#ce93d8"/>
  <rect x="220" y="138" width="60" height="15" rx="3" fill="#ce93d8"/>
  <rect x="220" y="161" width="60" height="15" rx="3" fill="#ce93d8"/>
  <rect x="220" y="184" width="60" height="15" rx="3" fill="#ce93d8"/>
