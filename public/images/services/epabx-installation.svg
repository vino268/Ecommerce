  <line x1="75" y1="260" x2="150" y2="240" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="4"/>
  <line x1="175" y1="260" x2="200" y2="240" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="4"/>
