  <text x="200" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7b1fa2">8 Channel Panel Setup</text>
  <text x="200" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9c27b0">₹1,500 per panel</text>
