<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#efebe9"/>
      <stop offset="100%" style="stop-color:#d7ccc8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Gate track -->
  <rect x="50" y="200" width="300" height="8" rx="2" fill="#795548" stroke="#5d4037" stroke-width="1"/>
  <!-- Gate panels -->
  <rect x="60" y="100" width="50" height="100" rx="3" fill="#9e9e9e" stroke="#757575" stroke-width="2"/>
  <rect x="115" y="100" width="50" height="100" rx="3" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="2"/>
  <rect x="170" y="100" width="50" height="100" rx="3" fill="#9e9e9e" stroke="#757575" stroke-width="2"/>
  <!-- Gate post -->
  <rect x="280" y="80" width="20" height="130" rx="3" fill="#5d4037" stroke="#4e342e" stroke-width="2"/>
  <!-- Motor box -->
  <rect x="255" y="90" width="40" height="30" rx="4" fill="#37474f" stroke="#263238" stroke-width="2"/>
  <circle cx="275" cy="105" r="8" fill="#455a64"/>
  <circle cx="275" cy="105" r="4" fill="#607d8b"/>
  <!-- Arrow showing sliding motion -->
  <path d="M225 150 L260 150" stroke="#4caf50" stroke-width="3" fill="none"/>
  <polygon points="260,145 270,150 260,155" fill="#4caf50"/>
  <!-- Gear icon -->
  <circle cx="275" cy="105" r="12" fill="none" stroke="#78909c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4e342e">Sliding Gate AMC</text>
  <text x="200" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d4037">Motor & Track Maintenance</text>
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#795548">₹8,000 per year</text>
</svg>