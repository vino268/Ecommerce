<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Wall -->
  <rect x="50" y="60" width="300" height="200" rx="4" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
  <!-- Camera on wall -->
  <rect x="240" y="80" width="60" height="30" rx="15" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="2"/>
  <circle cx="290" cy="95" r="10" fill="#424242"/>
  <circle cx="290" cy="95" r="6" fill="#212121"/>
  <!-- Bracket -->
  <rect x="230" y="75" width="15" height="40" rx="3" fill="#9e9e9e"/>
  <!-- Wire/Cable being installed -->
  <path d="M230 95 Q200 95 200 130 Q200 200 150 220" stroke="#1565c0" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <!-- Technician (simplified) -->
  <circle cx="150" cy="180" r="20" fill="#ffb74d"/>
  <rect x="135" y="200" width="30" height="50" rx="5" fill="#1565c0"/>
  <!-- Drill tool -->
  <rect x="170" y="195" width="40" height="10" rx="3" fill="#757575"/>
  <rect x="205" y="192" width="8" height="16" rx="2" fill="#424242"/>
  <!-- Screws on wall -->
  <circle cx="260" cy="72" r="3" fill="#9e9e9e"/>
  <circle cx="290" cy="72" r="3" fill="#9e9e9e"/>
  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2e7d32">CCTV Installation</text>
  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#558b2f">Professional Camera Mounting</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#689f38">₹500 per camera</text>
</svg>