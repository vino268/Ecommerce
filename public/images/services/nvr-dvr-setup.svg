<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- NVR box -->
  <rect x="100" y="120" width="200" height="50" rx="5" fill="#37474f" stroke="#263238" stroke-width="2"/>
  <rect x="110" y="128" width="180" height="34" rx="3" fill="#455a64"/>
  <!-- LEDs -->
  <circle cx="125" cy="140" r="3" fill="#4caf50"/>
  <circle cx="140" cy="140" r="3" fill="#2196f3"/>
  <circle cx="155" cy="140" r="3" fill="#ffeb3b"/>
  <circle cx="170" cy="140" r="3" fill="#ffeb3b"/>
  <!-- Monitor above -->
  <rect x="120" y="50" width="160" height="60" rx="4" fill="#1a237e" stroke="#283593" stroke-width="2"/>
  <!-- Grid on monitor - 4 camera views -->
  <rect x="125" y="55" width="72" height="23" fill="#0d47a1"/>
  <rect x="203" y="55" width="72" height="23" fill="#1565c0"/>
  <rect x="125" y="82" width="72" height="23" fill="#1565c0"/>
  <rect x="203" y="82" width="72" height="23" fill="#0d47a1"/>
  <!-- Hard drive being installed -->
  <rect x="135" y="190" width="80" height="55" rx="4" fill="#78909c" stroke="#546e7a" stroke-width="2"/>
  <text x="175" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#263238">HDD</text>
  <!-- Arrow showing insertion -->
  <path d="M175 250 L175 170" stroke="#2196f3" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="175,170 170,180 180,180" fill="#2196f3"/>
  <!-- Ethernet cable -->
  <path d="M300 145 Q330 145 330 100 Q330 70 310 70" stroke="#4caf50" stroke-width="2.5" fill="none"/>
  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565c0">NVR/DVR Setup</text>
  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1976d2">Complete Installation & Config</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#42a5f5">₹1,000 per unit</text>
</svg>