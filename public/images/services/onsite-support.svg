<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <!-- Technician -->
  <circle cx="200" cy="100" r="30" fill="#ffb74d" stroke="#f57c00" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="190" cy="95" r="3" fill="#3e2723"/>
  <circle cx="210" cy="95" r="3" fill="#3e2723"/>
  <!-- Smile -->
  <path d="M190 108 Q200 115 210 108" stroke="#3e2723" stroke-width="2" fill="none"/>
  <!-- Body -->
  <rect x="170" y="130" width="60" height="70" rx="8" fill="#1565c0"/>
  <!-- ID badge -->
  <rect x="210" y="140" width="15" height="20" rx="2" fill="#ffffff"/>
  <rect x="213" y="143" width="9" height="5" rx="1" fill="#1565c0"/>
  <!-- Arms -->
  <rect x="145" y="135" width="25" height="55" rx="8" fill="#1565c0"/>
  <rect x="230" y="135" width="25" height="55" rx="8" fill="#1565c0"/>
  <!-- Toolbox -->
  <rect x="130" y="195" width="50" height="35" rx="4" fill="#f44336" stroke="#d32f2f" stroke-width="2"/>
  <rect x="145" y="188" width="20" height="12" rx="3" fill="#d32f2f"/>
  <!-- Wrench icon -->
  <path d="M245 200 L270 225" stroke="#757575" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="245" cy="198" r="7" fill="none" stroke="#757575" stroke-width="3"/>
  <!-- Multimeter -->
  <rect x="265" y="175" width="25" height="35" rx="3" fill="#ffeb3b" stroke="#f9a825" stroke-width="1.5"/>
  <rect x="270" y="180" width="15" height="12" rx="2" fill="#263238"/>
  <!-- Label -->
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2e7d32">On-Site Support</text>
  <text x="200" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Troubleshooting & Repair</text>
  <text x="200" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">₹500 per visit</text>
</svg>